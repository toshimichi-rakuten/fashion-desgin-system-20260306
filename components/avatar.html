<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1rem;font-family:var(--font-family-display)">Avatar</h2>
<div style="display:flex;align-items:flex-end;gap:1rem;margin-bottom:1.5rem">
  <div class="avatar avatar-xs">YK</div>
  <div class="avatar avatar-sm">MN</div>
  <div class="avatar avatar-md" style="background:linear-gradient(135deg,#db2777,#9d174d);color:#fff">RK</div>
  <div class="avatar avatar-lg" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff">AS</div>
  <div class="avatar avatar-xl" style="background:linear-gradient(135deg,#22c55e,#15803d);color:#fff">TH</div>
  <div class="avatar avatar-2xl" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff">FK</div>
</div>
<h3 style="margin-bottom:.75rem;font-size:1rem">Avatar Group</h3>
<div class="avatar-group">
  <div class="avatar avatar-md" style="background:linear-gradient(135deg,#db2777,#9d174d);color:#fff;font-weight:700">YK</div>
  <div class="avatar avatar-md" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:700">MN</div>
  <div class="avatar avatar-md" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-weight:700">RK</div>
  <div class="avatar avatar-md" style="background:var(--color-neutral-200);color:var(--color-text-secondary);font-size:var(--font-size-xs);font-weight:600">+8</div>
</div>
</body></html>
