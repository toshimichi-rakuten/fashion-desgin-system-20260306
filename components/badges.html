<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1rem;font-family:var(--font-family-display)">Badges</h2>
<div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem">
  <span class="badge badge-brand">Brand New</span>
  <span class="badge badge-neutral">Used</span>
  <span class="badge badge-success">In Stock</span>
  <span class="badge badge-warning">Low Stock</span>
  <span class="badge badge-error">SALE</span>
  <span class="badge badge-info">New Arrival</span>
  <span class="badge badge-solid">HOT</span>
</div>
<div style="display:flex;gap:.75rem;flex-wrap:wrap">
  <span class="badge badge-success badge-lg"><span class="badge-dot" style="background:var(--color-success-500)"></span>Available</span>
  <span class="badge badge-error badge-lg">-30% OFF</span>
  <span class="badge badge-brand badge-lg">LIMITED EDITION</span>
</div>
</body></html>
