<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1.5rem;font-family:var(--font-family-display)">Cards</h2>
<div style="display:grid;grid-template-columns:repeat(3,280px);gap:1.25rem">
  <div class="card"><div class="card-header"><strong>Card Header</strong></div><div class="card-body"><p style="font-size:.875rem;color:var(--color-text-secondary)">Card body content goes here. Use cards to group related information.</p></div><div class="card-footer"><button class="btn btn-secondary btn-sm btn-full">Action</button></div></div>
  <div class="card card-flat"><div class="card-body"><span class="badge badge-brand" style="margin-bottom:.75rem">Featured</span><h3 style="margin-bottom:.5rem">Flat Card</h3><p style="font-size:.875rem;color:var(--color-text-secondary);margin-bottom:1rem">No border, subtle shadow. Hover for elevation.</p><button class="btn btn-primary btn-sm">CTA</button></div></div>
  <div class="card"><div class="card-body"><div style="display:flex;gap:.75rem;align-items:center;margin-bottom:1rem"><div class="avatar avatar-md" style="background:linear-gradient(135deg,#db2777,#9d174d);color:#fff">YK</div><div><div style="font-weight:600;font-size:.875rem">Yuki_Style</div><div style="font-size:.75rem;color:var(--color-text-tertiary)">Top Seller</div></div></div><p style="font-size:.875rem;color:var(--color-text-secondary)">User / seller info card with avatar.</p></div></div>
</div>
</body></html>
