<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1.5rem;font-family:var(--font-family-display)">Divider</h2>
<div style="max-width:480px">
  <p style="font-size:.875rem;color:var(--color-text-secondary);margin-bottom:1rem">Content before the divider.</p>
  <hr class="divider">
  <p style="font-size:.875rem;color:var(--color-text-secondary);margin-bottom:1.5rem">Content after the divider.</p>
  <div class="divider-with-text">or sign in with</div>
  <div style="display:flex;gap:.75rem;margin-top:1.25rem">
    <button class="btn btn-secondary btn-sm" style="flex:1">Google</button>
    <button class="btn btn-secondary btn-sm" style="flex:1">Apple</button>
  </div>
</div>
</body></html>
