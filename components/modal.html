<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1rem;font-family:var(--font-family-display)">Modal</h2>
<button class="btn btn-primary" id="open">Open Modal</button>
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Confirm Purchase</div><button class="modal-close" id="close"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body"><p style="color:var(--color-text-secondary)">Are you sure you want to purchase this item for &#xA5;3,500?</p></div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" id="cancel">Cancel</button><button class="btn btn-primary btn-sm">Confirm &amp; Pay</button></div>
  </div>
</div>
<script>function show(){document.getElementById("modal").style.display="flex"}function hide(){document.getElementById("modal").style.display="none"}document.getElementById("open").onclick=show;document.getElementById("close").onclick=hide;document.getElementById("cancel").onclick=hide;document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)hide()});</script>
</body></html>
