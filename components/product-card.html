<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1rem;font-family:var(--font-family-display)">Product Card</h2>
<div style="display:grid;grid-template-columns:repeat(3,220px);gap:1.25rem">
  <div class="product-card">
    <div class="product-card-image" style="background:linear-gradient(145deg,#fce7f3,#fbcfe8)">
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem">👗</div>
      <div class="product-card-badges"><span class="badge badge-error">-25%</span><span class="badge badge-brand">LIKE NEW</span></div>
      <div class="product-card-actions"><button class="product-card-action-btn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg></button></div>
    </div>
    <div class="product-card-body">
      <div class="product-card-brand">Zara</div>
      <div class="product-card-name">Floral Wrap Midi Dress</div>
      <div class="product-card-price"><span class="price-current">&#xA5;3,500</span><span class="price-original">&#xA5;4,700</span><span class="price-discount">-25%</span></div>
    </div>
  </div>
  <div class="product-card">
    <div class="product-card-image" style="background:linear-gradient(145deg,#171717,#404040)">
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem">&#x1F45C;</div>
      <div class="product-card-badges"><span class="badge badge-neutral">AUTHENTIC</span></div>
      <div class="product-card-actions"><button class="product-card-action-btn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg></button></div>
    </div>
    <div class="product-card-body">
      <div class="product-card-brand">Coach</div>
      <div class="product-card-name">Tabby Shoulder Bag 26</div>
      <div class="product-card-price"><span class="price-current">&#xA5;38,000</span></div>
    </div>
  </div>
</div>
</body></html>
