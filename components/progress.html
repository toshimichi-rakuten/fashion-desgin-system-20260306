<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1.5rem;font-family:var(--font-family-display)">Progress Bars</h2>
<div style="max-width:480px;display:flex;flex-direction:column;gap:1.25rem">
  <div><div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.375rem;color:var(--color-text-secondary)"><span>Profile Complete</span><span style="font-weight:600;color:var(--color-success-700)">80%</span></div><div class="progress"><div class="progress-bar" style="width:80%;background:var(--color-success-500)"></div></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.375rem;color:var(--color-text-secondary)"><span>Uploading</span><span style="font-weight:600">45%</span></div><div class="progress"><div class="progress-bar" style="width:45%"></div></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.375rem;color:var(--color-text-secondary)"><span>Storage Used</span><span style="font-weight:600;color:var(--color-error-700)">92%</span></div><div class="progress progress-sm"><div class="progress-bar" style="width:92%;background:var(--color-error-500)"></div></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.375rem;color:var(--color-text-secondary)"><span>Large Bar</span><span style="font-weight:600">60%</span></div><div class="progress progress-lg"><div class="progress-bar" style="width:60%"></div></div></div>
</div>
</body></html>
