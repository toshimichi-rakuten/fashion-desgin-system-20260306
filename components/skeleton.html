<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1.5rem;font-family:var(--font-family-display)">Skeleton Loaders</h2>
<div style="display:grid;grid-template-columns:200px 1fr;gap:2rem">
  <div>
    <div class="skeleton" style="aspect-ratio:.75;border-radius:var(--radius-2xl);margin-bottom:.75rem"></div>
    <div class="skeleton skeleton-text" style="width:60%;margin-bottom:.375rem"></div>
    <div class="skeleton skeleton-text" style="width:80%;margin-bottom:.375rem"></div>
    <div class="skeleton skeleton-text" style="width:40%"></div>
  </div>
  <div>
    <div style="display:flex;gap:.75rem;margin-bottom:1rem">
      <div class="skeleton skeleton-circle" style="width:3rem;height:3rem;flex-shrink:0"></div>
      <div style="flex:1"><div class="skeleton skeleton-text" style="width:50%;margin-bottom:.375rem"></div><div class="skeleton skeleton-text" style="width:35%"></div></div>
    </div>
    <div class="skeleton" style="width:100%;height:6rem;border-radius:var(--radius-xl);margin-bottom:.75rem"></div>
    <div class="skeleton skeleton-text" style="width:100%;margin-bottom:.375rem"></div>
    <div class="skeleton skeleton-text" style="width:80%;margin-bottom:.375rem"></div>
    <div class="skeleton skeleton-text" style="width:60%"></div>
  </div>
</div>
</body></html>
