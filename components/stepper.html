<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle)}</style>
</head><body>
<h2 style="margin-bottom:1.5rem;font-family:var(--font-family-display)">Step Indicator</h2>
<div style="max-width:480px;margin-bottom:2rem">
  <h3 style="font-size:.875rem;margin-bottom:1rem;color:var(--color-text-secondary)">Checkout Flow</h3>
  <div class="steps">
    <div class="step-node done"><div class="step-circle-node"><svg width="12" height="12" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><path d="M4.5 12.75l6 6 9-13.5"/></svg></div><div class="step-node-label">Cart</div></div>
    <div class="step-node done"><div class="step-circle-node"><svg width="12" height="12" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><path d="M4.5 12.75l6 6 9-13.5"/></svg></div><div class="step-node-label">Address</div></div>
    <div class="step-node active"><div class="step-circle-node">3</div><div class="step-node-label">Payment</div></div>
    <div class="step-node"><div class="step-circle-node">4</div><div class="step-node-label">Confirm</div></div>
  </div>
</div>
</body></html>
