<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{padding:2rem;background:var(--color-bg-subtle);min-height:100vh}</style>
</head><body>
<h2 style="margin-bottom:1.5rem;font-family:var(--font-family-display)">Toast Notifications</h2>
<div style="display:flex;flex-direction:column;gap:.75rem;max-width:360px">
  <div class="toast" style="animation:none">
    <svg class="toast-icon" style="color:var(--color-success-500)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div class="toast-body"><div class="toast-title">Item Listed!</div><div class="toast-message">Your Zara Dress is now live.</div></div>
    <button class="toast-close" id="c1"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
  <div class="toast" style="animation:none">
    <svg class="toast-icon" style="color:var(--color-primary)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
    <div class="toast-body"><div class="toast-title">Added to Wishlist</div><div class="toast-message">Coach Tabby Bag saved.</div></div>
    <button class="toast-close" id="c2"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
  <div class="toast" style="animation:none">
    <svg class="toast-icon" style="color:var(--color-error-500)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
    <div class="toast-body"><div class="toast-title">Payment Failed</div><div class="toast-message">Card declined. Please check details.</div></div>
    <button class="toast-close" id="c3"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
</div>
<script>["c1","c2","c3"].forEach(function(id){document.getElementById(id).addEventListener("click",function(){var t=document.getElementById(id).closest(".toast");t.style.transition="all .3s";t.style.opacity=0;t.style.transform="translateX(100%)";setTimeout(function(){t.remove()},300)})});</script>
</body></html>
