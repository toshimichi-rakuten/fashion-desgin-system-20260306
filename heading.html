<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heading Component</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f9fafb;
    }
    .sample-heading {
      font-size: 24px;
      font-weight: bold;
      color: #333333;
      margin: 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #bf0000;
    }
  </style>
</head>
<body>
  <h1 class="sample-heading">サンプル見出し</h1>
</body>
</html>
