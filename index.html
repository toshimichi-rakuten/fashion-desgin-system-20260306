<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Library</title>
  <style>
    :root {
      --primary-color: #111111;
      --bg-color: #ffffff;
      --text-main: #333333;
      --text-muted: #888888;
      --border-color: #eaeaea;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .main-container {
      max-width: 640px;
      margin: 80px auto;
      padding: 0 32px;
    }

    .header {
      margin-bottom: 64px;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--primary-color);
    }

    .header p {
      margin: 0;
      font-size: 15px;
      color: var(--text-muted);
    }

    .section-block {
      margin-bottom: 48px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin: 0 0 16px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .link-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .link-item {
      margin-bottom: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      color: var(--text-main);
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }

    .nav-link:hover {
      background-color: #f5f5f5;
    }

    .nav-link-title {
      font-size: 16px;
      font-weight: 500;
    }

    .nav-link-desc {
      font-size: 14px;
      color: var(--text-muted);
    }

    .nav-icon {
      color: var(--text-muted);
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .nav-link:hover .nav-icon {
      transform: translateX(4px);
      color: var(--primary-color);
    }
  </style>
</head>
<body>

  <main class="main-container">
    <header class="header">
      <h1>デザインシステム 目次</h1>
      <p>コンポーネントとページのプレビューカタログ</p>
    </header>

    <div class="section-block">
      <h2 class="section-title">Pages</h2>
      <ul class="link-list">
        <li class="link-item">
          <a href="pages/simple-page.html" class="nav-link">
            <div>
              <div class="nav-link-title">シンプルなページ</div>
              <div class="nav-link-desc">パーツを組み合わせた基本レイアウト</div>
            </div>
            <span class="nav-icon">→</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="section-block">
      <h2 class="section-title">Components</h2>
      <ul class="link-list">
        <li class="link-item">
          <a href="components/button.html" class="nav-link">
            <div>
              <div class="nav-link-title">ボタン (Button)</div>
              <div class="nav-link-desc">アクションを促す基本コンポーネント</div>
            </div>
            <span class="nav-icon">→</span>
          </a>
        </li>
        <li class="link-item">
          <a href="components/heading.html" class="nav-link">
            <div>
              <div class="nav-link-title">見出し (Heading)</div>
              <div class="nav-link-desc">セクションのタイトルを表示</div>
            </div>
            <span class="nav-icon">→</span>
          </a>
        </li>
      </ul>
    </div>

  </main>
</body>
</html>
