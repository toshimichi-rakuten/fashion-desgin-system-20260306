<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Address Book — Rakuma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
</head>
<body style="background:var(--color-bg-subtle);min-height:100vh">
<nav class="navbar">
  <a href="../index.html" class="navbar-brand" style="text-decoration:none">Rakuma</a>
  <div class="navbar-nav"><a class="nav-link" href="profile.html">Profile</a><a class="nav-link active" href="#">Addresses</a></div>
  <div class="navbar-actions"><div class="avatar avatar-sm" style="background:linear-gradient(135deg,#db2777,#9d174d);color:#fff">YK</div></div>
</nav>
<div class="container" style="padding-top:var(--space-10);padding-bottom:var(--space-20);max-width:760px">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:var(--space-8)">
    <div>
      <h1 style="font-family:var(--font-family-display);font-size:var(--font-size-3xl);font-weight:700">Address Book</h1>
      <p style="color:var(--color-text-secondary);margin-top:var(--space-2)">Manage your shipping addresses</p>
    </div>
    <button class="btn btn-primary" onclick="showAddForm()">&#x2795; Add Address</button>
  </div>
  <!-- Saved addresses -->
  <div id="addressList">
    <div style="background:#fff;border:1px solid var(--color-border-default);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-4);position:relative">
      <div style="position:absolute;top:var(--space-4);right:var(--space-4);display:flex;gap:var(--space-2)">
        <span class="badge badge-brand">Default</span>
        <button class="btn btn-ghost btn-sm" style="padding:.25rem .5rem">Edit</button>
        <button class="btn btn-ghost btn-sm" style="padding:.25rem .5rem;color:var(--color-error-500)">Remove</button>
      </div>
      <div style="display:flex;gap:var(--space-4);align-items:flex-start">
        <div style="width:3rem;height:3rem;background:var(--color-primary-subtle);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0">&#x1F3E0;</div>
        <div>
          <div style="font-weight:700;margin-bottom:var(--space-1)">Yuki Kobayashi</div>
          <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);line-height:var(--line-height-relaxed)">
            1-2-3 Dogenzaka, Shibuya-ku<br>
            Tokyo 150-0043<br>
            Japan
          </div>
          <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-2)">&#x260E;&#xFE0F; 090-1234-5678</div>
        </div>
      </div>
    </div>
    <div style="background:#fff;border:1px solid var(--color-border-default);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-4);position:relative">
      <div style="position:absolute;top:var(--space-4);right:var(--space-4);display:flex;gap:var(--space-2)">
        <button class="btn btn-secondary btn-sm">Set Default</button>
        <button class="btn btn-ghost btn-sm" style="padding:.25rem .5rem">Edit</button>
        <button class="btn btn-ghost btn-sm" style="padding:.25rem .5rem;color:var(--color-error-500)">Remove</button>
      </div>
      <div style="display:flex;gap:var(--space-4);align-items:flex-start">
        <div style="width:3rem;height:3rem;background:var(--color-info-50);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0">&#x1F3E2;</div>
        <div>
          <div style="font-weight:700;margin-bottom:var(--space-1)">Office (Rakuten)</div>
          <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);line-height:var(--line-height-relaxed)">
            1-14-1 Tamagawa, Setagaya-ku<br>
            Tokyo 158-0094<br>
            Japan
          </div>
          <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-2)">&#x260E;&#xFE0F; 03-9876-5432</div>
        </div>
      </div>
    </div>
  </div>
  <!-- Add address form (hidden) -->
  <div id="addForm" style="display:none;background:#fff;border:1px solid var(--color-primary);border-radius:var(--radius-2xl);padding:var(--space-8);margin-bottom:var(--space-4)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-6)">
      <h3 style="font-weight:700;font-size:var(--font-size-lg)">Add New Address</h3>
      <button class="modal-close" onclick="hideAddForm()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="grid grid-2" style="gap:var(--space-4);margin-bottom:var(--space-4)">
      <div class="form-group">
        <label class="form-label form-label-required">Full Name</label>
        <input type="text" class="form-input" placeholder="Yuki Kobayashi">
      </div>
      <div class="form-group">
        <label class="form-label form-label-required">Phone</label>
        <input type="tel" class="form-input" placeholder="090-0000-0000">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:var(--space-4)">
      <label class="form-label">Address nickname</label>
      <input type="text" class="form-input" placeholder="e.g. Home, Office, Parents...">
    </div>
    <div class="form-group" style="margin-bottom:var(--space-4)">
      <label class="form-label form-label-required">Postal Code</label>
      <div style="display:flex;gap:var(--space-3)">
        <input type="text" class="form-input" placeholder="000-0000" style="max-width:160px">
        <button class="btn btn-secondary btn-sm">Auto-fill</button>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:var(--space-4)">
      <label class="form-label form-label-required">Prefecture</label>
      <select class="form-input form-select">
        <option value="">Select prefecture</option>
        <option>Tokyo</option><option>Osaka</option><option>Kanagawa</option>
        <option>Aichi</option><option>Fukuoka</option><option>Hokkaido</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:var(--space-4)">
      <label class="form-label form-label-required">Street Address</label>
      <input type="text" class="form-input" placeholder="1-2-3 Shibuya, Shibuya-ku">
    </div>
    <div class="form-group" style="margin-bottom:var(--space-5)">
      <label class="form-label">Apartment / Building</label>
      <input type="text" class="form-input" placeholder="Room 301">
    </div>
    <div style="margin-bottom:var(--space-6)">
      <label class="checkbox-wrapper"><input type="checkbox"><div class="checkbox-box"></div><span class="checkbox-label">Set as default shipping address</span></label>
    </div>
    <div style="display:flex;gap:var(--space-3)">
      <button class="btn btn-ghost btn-lg" onclick="hideAddForm()">Cancel</button>
      <button class="btn btn-primary btn-full btn-lg">Save Address</button>
    </div>
  </div>
</div>
<script>function showAddForm(){document.getElementById("addForm").style.display="block";document.getElementById("addForm").scrollIntoView({behavior:"smooth"});}function hideAddForm(){document.getElementById("addForm").style.display="none";}</script>
</body></html>
