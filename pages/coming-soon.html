<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coming Soon — Rakuma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>
body{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#831843 0%,#db2777 40%,#ec4899 70%,#f9a8d4 100%)}
.cs-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:var(--space-16) var(--space-6)}
.cs-card{background:#fff;border-radius:var(--radius-3xl);padding:var(--space-16) var(--space-12);text-align:center;max-width:560px;width:100%;box-shadow:var(--shadow-2xl)}
.countdown{display:flex;gap:var(--space-6);justify-content:center;margin-bottom:var(--space-10)}
.countdown-unit{display:flex;flex-direction:column;align-items:center;gap:var(--space-2)}
.countdown-num{font-family:var(--font-family-display);font-size:var(--font-size-5xl);font-weight:900;color:var(--color-primary);line-height:1}
.countdown-label{font-size:var(--font-size-xs);font-weight:600;letter-spacing:var(--letter-spacing-widest);text-transform:uppercase;color:var(--color-text-tertiary)}
.countdown-sep{font-family:var(--font-family-display);font-size:var(--font-size-4xl);font-weight:900;color:var(--color-brand-200);align-self:flex-start;margin-top:.25rem}
</style>
</head>
<body>
<div class="cs-wrap">
  <div class="cs-card">
    <div style="font-family:var(--font-family-display);font-size:var(--font-size-2xl);font-weight:900;background:linear-gradient(135deg,#9d174d,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--space-6)">Rakuma</div>
    <h1 style="font-family:var(--font-family-display);font-size:var(--font-size-4xl);font-weight:900;color:var(--color-text-primary);line-height:1.15;margin-bottom:var(--space-4)">Something
Exciting
is Coming</h1>
    <p style="color:var(--color-text-secondary);font-size:var(--font-size-lg);line-height:var(--line-height-relaxed);margin-bottom:var(--space-10)">We&apos;re working on a brand new feature for Japan&apos;s fashion community. Be the first to know when we launch.</p>
    <div class="countdown">
      <div class="countdown-unit"><div class="countdown-num" id="days">07</div><div class="countdown-label">Days</div></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><div class="countdown-num" id="hours">14</div><div class="countdown-label">Hours</div></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><div class="countdown-num" id="mins">32</div><div class="countdown-label">Mins</div></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><div class="countdown-num" id="secs">00</div><div class="countdown-label">Secs</div></div>
    </div>
    <div style="display:flex;gap:var(--space-2);max-width:420px;margin:0 auto var(--space-8)">
      <input type="email" class="form-input" placeholder="your@email.com" id="emailInput">
      <button class="btn btn-primary" onclick="notify()" style="white-space:nowrap">Notify Me</button>
    </div>
    <div id="notifyMsg" style="display:none;margin-bottom:var(--space-6)">
      <div class="alert alert-success" style="text-align:left">
        <svg class="alert-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <div class="alert-content">You&apos;re on the list! We&apos;ll email you when we launch.</div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:var(--space-6);font-size:var(--font-size-xs);color:var(--color-text-tertiary)">
      <span>&#x1F4F1; iOS &amp; Android</span>
      <span>&#x1F310; Web</span>
      <span>&#x1F1EF;&#x1F1F5; Japan</span>
    </div>
    <div style="margin-top:var(--space-8);padding-top:var(--space-6);border-top:1px solid var(--color-border-default)">
      <a href="home.html" style="color:var(--color-primary);font-size:var(--font-size-sm)">&#8592; Back to Rakuma</a>
    </div>
  </div>
</div>
<script>
var target=new Date(Date.now()+7*24*60*60*1000+14*60*60*1000+32*60*1000);
function tick(){var now=new Date();var diff=target-now;if(diff<=0){clearInterval(timer);return;}
var d=Math.floor(diff/86400000);var h=Math.floor((diff%86400000)/3600000);var m=Math.floor((diff%3600000)/60000);var s=Math.floor((diff%60000)/1000);
document.getElementById("days").textContent=String(d).padStart(2,"0");
document.getElementById("hours").textContent=String(h).padStart(2,"0");
document.getElementById("mins").textContent=String(m).padStart(2,"0");
document.getElementById("secs").textContent=String(s).padStart(2,"0");}
var timer=setInterval(tick,1000);tick();
function notify(){var v=document.getElementById("emailInput").value.trim();if(!v.includes("@"))return;document.getElementById("emailInput").value="";document.getElementById("notifyMsg").style.display="block";}
</script>
</body></html>
