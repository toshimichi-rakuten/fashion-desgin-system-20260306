<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{min-height:100vh;background:var(--color-bg-subtle)}.auth-wrap{min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:var(--space-8) var(--space-4)}.auth-card{background:#fff;border-radius:var(--radius-3xl);padding:var(--space-10);width:100%;max-width:440px;box-shadow:var(--shadow-2xl)}.auth-logo{font-family:var(--font-family-display);font-size:var(--font-size-2xl);font-weight:900;text-align:center;margin-bottom:var(--space-8);background:linear-gradient(135deg,#9d174d,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.divider-with-text{display:flex;align-items:center;gap:var(--space-4);color:var(--color-text-tertiary);font-size:var(--font-size-xs);margin-block:var(--space-5)}.divider-with-text::before,.divider-with-text::after{content:"";flex:1;border-top:1px solid var(--color-border-default)}.social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:var(--space-3);padding:var(--space-3) var(--space-5);border:1.5px solid var(--color-border-default);border-radius:var(--radius-lg);background:#fff;font-size:var(--font-size-sm);font-weight:500;cursor:pointer;transition:all var(--duration-fast);margin-bottom:var(--space-3)}.social-btn:hover{background:var(--color-bg-subtle);border-color:var(--color-border-strong)}</style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="navbar-brand" style="text-decoration:none">Rakuma</a>
  <div class="navbar-actions">
    <a href="home.html" class="btn btn-ghost btn-sm">Browse</a>
    <a href="register.html" class="btn btn-secondary btn-sm">Sign Up</a>
    <a href="login.html" class="btn btn-primary btn-sm">Log In</a>
  </div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Rakuma</div>
    <h1 style="font-size:var(--font-size-2xl);font-weight:700;text-align:center;margin-bottom:var(--space-2)">Welcome back</h1>
    <p style="text-align:center;color:var(--color-text-secondary);font-size:var(--font-size-sm);margin-bottom:var(--space-8)">Log in to your account to continue</p>
    <!-- Social login -->
    <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</button>
    <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>Continue with Facebook</button>
    <div class="divider-with-text">or log in with email</div>
    <div class="form-group" style="margin-bottom:var(--space-4)">
      <label class="form-label form-label-required">Email</label>
      <div class="input-group"><span class="input-addon input-addon-left"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg></span><input type="email" class="form-input" placeholder="you@email.com" style="padding-left:2.5rem"></div>
    </div>
    <div class="form-group" style="margin-bottom:var(--space-2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
        <label class="form-label" style="margin:0">Password</label>
        <a href="#" style="font-size:var(--font-size-xs);color:var(--color-primary)">Forgot password?</a>
      </div>
      <div class="input-group"><span class="input-addon input-addon-left"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg></span><input type="password" class="form-input" placeholder="••••••••" style="padding-left:2.5rem"></div>
    </div>
    <div style="margin-bottom:var(--space-6)">
      <label class="checkbox-wrapper"><input type="checkbox"><div class="checkbox-box"></div><span class="checkbox-label">Remember me for 30 days</span></label>
    </div>
    <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:var(--space-6)">Log In</button>
    <p style="text-align:center;font-size:var(--font-size-sm);color:var(--color-text-secondary)">Don&apos;t have an account? <a href="register.html" style="color:var(--color-primary);font-weight:600">Sign up free</a></p>
  </div>
</div>
</body></html>
