<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maintenance — Rakuma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/main.css">
<style>body{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#171717 0%,#1a0a12 100%)}</style>
</head>
<body>
<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:var(--space-16) var(--space-6);text-align:center">
  <div style="max-width:560px">
    <div style="font-family:var(--font-family-display);font-size:var(--font-size-2xl);font-weight:900;color:var(--color-brand-400);margin-bottom:var(--space-8)">Rakuma</div>
    <div style="font-size:5rem;margin-bottom:var(--space-6);display:flex;justify-content:center">
      <div class="spinner spinner-xl" style="border-color:rgba(219,39,119,.2);border-top-color:var(--color-primary)"></div>
    </div>
    <h1 style="font-family:var(--font-family-display);font-size:var(--font-size-4xl);font-weight:900;color:#fff;margin-bottom:var(--space-4)">We&apos;ll be right back</h1>
    <p style="font-size:var(--font-size-lg);color:rgba(255,255,255,.7);margin-bottom:var(--space-8);line-height:var(--line-height-relaxed)">Rakuma is undergoing scheduled maintenance to bring you a better experience. We&apos;ll be back shortly.</p>
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-8)">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:var(--space-4)">
        <div style="text-align:center"><div id="hours" style="font-family:var(--font-family-display);font-size:var(--font-size-4xl);font-weight:900;color:var(--color-brand-400)">02</div><div style="font-size:var(--font-size-xs);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em">Hours</div></div>
        <div style="font-family:var(--font-family-display);font-size:var(--font-size-3xl);font-weight:900;color:rgba(255,255,255,.3);align-self:flex-start;margin-top:.5rem">:</div>
        <div style="text-align:center"><div id="mins2" style="font-family:var(--font-family-display);font-size:var(--font-size-4xl);font-weight:900;color:var(--color-brand-400)">30</div><div style="font-size:var(--font-size-xs);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em">Minutes</div></div>
        <div style="font-family:var(--font-family-display);font-size:var(--font-size-3xl);font-weight:900;color:rgba(255,255,255,.3);align-self:flex-start;margin-top:.5rem">:</div>
        <div style="text-align:center"><div id="secs2" style="font-family:var(--font-family-display);font-size:var(--font-size-4xl);font-weight:900;color:var(--color-brand-400)">00</div><div style="font-size:var(--font-size-xs);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em">Seconds</div></div>
      </div>
    </div>
    <div style="display:flex;gap:var(--space-3);justify-content:center;flex-wrap:wrap;margin-bottom:var(--space-8)">
      <a href="#" style="color:rgba(255,255,255,.5);font-size:var(--font-size-sm);text-decoration:none" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.5)'">&#x26A1; System Status</a>
      <span style="color:rgba(255,255,255,.2)">|</span>
      <a href="#" style="color:rgba(255,255,255,.5);font-size:var(--font-size-sm);text-decoration:none" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.5)'">&#x1F4AC; @Rakuma_JP</a>
      <span style="color:rgba(255,255,255,.2)">|</span>
      <a href="mailto:support@rakuma.jp" style="color:rgba(255,255,255,.5);font-size:var(--font-size-sm);text-decoration:none" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.5)'">&#x2709;&#xFE0F; Contact</a>
    </div>
    <p style="font-size:var(--font-size-xs);color:rgba(255,255,255,.3)">Started: March 6, 2026 at 03:00 JST &nbsp;&bull;&nbsp; Expected: 05:30 JST</p>
  </div>
</div>
<script>
var target=new Date(Date.now()+2*60*60*1000+30*60*1000);
function tick2(){var now=new Date();var diff=Math.max(0,target-now);var h=Math.floor(diff/3600000);var m=Math.floor((diff%3600000)/60000);var s=Math.floor((diff%60000)/1000);
document.getElementById("hours").textContent=String(h).padStart(2,"0");
document.getElementById("mins2").textContent=String(m).padStart(2,"0");
document.getElementById("secs2").textContent=String(s).padStart(2,"0");}
var timer2=setInterval(tick2,1000);tick2();
</script>
</body></html>
