<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Page</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 32px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .sample-heading {
      font-size: 24px;
      font-weight: bold;
      color: #333333;
      margin: 0 0 24px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #bf0000;
    }
    .content-text {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
      color: #555;
    }
    .sample-button {
      display: inline-block;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      background-color: #bf0000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background-color 0.2s ease;
    }
    .sample-button:hover {
      background-color: #990000;
    }
    .sample-button:active {
      background-color: #800000;
    }
    .actions {
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="sample-heading">シンプルなページ</h1>
    
    <p class="content-text">
      これは「見出し」と「ボタン」のパーツを組み合わせて作成したシンプルなページのサンプルです。<br>
      各コンポーネントのスタイルをこのページ内で共有してレイアウトを構成しています。
    </p>

    <div class="actions">
      <a href="#" class="sample-button">詳しく見る</a>
    </div>
  </div>
</body>
</html>
